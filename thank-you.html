<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | BridgeToConnect</title>

  <!-- Google Fonts (same family as main site) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
      background: #030312;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f0f4ff;
      overflow: hidden;
    }

    .bg-orbs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .bg-orbs span {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.45;
      animation: orbFloat 18s ease-in-out infinite alternate;
    }
    .bg-orbs span:nth-child(1) {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(56,189,248,0.7), transparent 70%);
      top: -100px; left: -100px;
      animation-duration: 20s;
    }
    .bg-orbs span:nth-child(2) {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(167,139,250,0.65), transparent 70%);
      bottom: -100px; right: -100px;
      animation-duration: 24s;
      animation-delay: -6s;
    }
    .bg-orbs span:nth-child(3) {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(34,197,94,0.5), transparent 70%);
      top: 50%; left: 50%;
      animation-duration: 22s;
      animation-delay: -12s;
    }
    @keyframes orbFloat {
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(40px,50px) scale(1.07); }
      100% { transform: translate(-30px,-25px) scale(0.95); }
    }

    .thank-you-card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(28px) saturate(200%);
      -webkit-backdrop-filter: blur(28px) saturate(200%);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 52px 44px;
      max-width: 440px;
      width: 90%;
      text-align: center;
      box-shadow:
        0 30px 80px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.16);
    }
    .thank-you-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      border-radius: 24px 24px 0 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    }

    .check {
    margin-bottom: 24px;
    }


    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #ffffff;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: #cbd5f5;
      margin-bottom: 28px;
    }

    a {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #030312;
      text-decoration: none;
      font-weight: 700;
      border-radius: 999px;
      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(34,197,94,0.45);
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(34,197,94,0.55);
    }
  </style>
</head>
<body>

  <div class="bg-orbs" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>

  <div class="thank-you-card">
  <div class="check">
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none"
       xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="12" r="10" stroke="#22c55e" stroke-width="2"/>
    <path d="M7 12.5l3 3 7-7"
          stroke="#22c55e"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </svg>
</div>

    <h1>Submission Received</h1>
    <p>
      Thank you for reaching out to BridgeToConnect.  
      We’ve received your details and will get back to you shortly.
    </p>
    <a href="/">Back to Home</a>
  </div>

</body>
</html>
